# Top-level upgrade recipe. Composes the per-module rename recipes (one per
# AF5 framework module, one per Axoniq commercial module, one per extension).
# Each per-module recipe is independently runnable. Placeholder recipes
# (Reactor / Kafka / AMQP / Mongo / JGroups / Spring Cloud / Multitenancy /
# CDI / OpenTracing extensions; Axoniq event-streaming, postgresql,
# snapshotting, spring-boot autoconfig) are intentionally excluded from this
# composite — they are no-ops today and will be enabled here once their
# structural implementations land.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.UpgradeAxonFramework4to5
displayName: Upgrade to Axon Framework 5
description: >-
  Migrates an Axon Framework 4.x application to Axon Framework 5. Bumps the
  Axon Framework dependency versions, then applies the per-module rename
  recipes (one per active extension and one per core framework module).
recipeList:
  # ── 1. Java compiler-target bump ────────────────────────────────────────
  # Updates the compiler target in build files (pom.xml / build.gradle) to
  # the configured LTS. Default is the latest LTS (Java 25); to target a
  # different version (e.g. Java 21), wrap this recipe in your own
  # rewrite.yml — see migration/README.md. No source-level modernizations
  # are applied here.
  - org.axonframework.migration.UpgradeJava

  # ── 2. Bump dependency versions ─────────────────────────────────────────
  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.axonframework
      artifactId: "*"
      newVersion: ${project.version}

  # ── 3. Axoniq commercial module migrations ──────────────────────────────
  # Run before the core OSS messaging rename so the Axoniq destinations win
  # for distributed-messaging classes that move to commercial.
  - org.axonframework.migration.AxonFramework4to5AxoniqAxonServerConnector
  - org.axonframework.migration.AxonFramework4to5AxoniqDeadLetter
  - org.axonframework.migration.AxonFramework4to5AxoniqDistributedMessaging

  # ── 4. Active extension migrations ──────────────────────────────────────
  - org.axonframework.migration.AxonFramework4to5SpringExtension
  - org.axonframework.migration.AxonFramework4to5SpringBootExtension
  - org.axonframework.migration.AxonFramework4to5SpringBootActuatorExtension
  - org.axonframework.migration.AxonFramework4to5MetricsExtension
  - org.axonframework.migration.AxonFramework4to5MicrometerExtension
  - org.axonframework.migration.AxonFramework4to5TracingOpenTelemetryExtension

  # ── 5. Core framework module migrations ─────────────────────────────────
  - org.axonframework.migration.AxonFramework4to5MessagingRenames
  - org.axonframework.migration.AxonFramework4to5ModellingRenames
  - org.axonframework.migration.AxonFramework4to5EventSourcingRenames
  - org.axonframework.migration.AxonFramework4to5ConfigurationRenames
  - org.axonframework.migration.AxonFramework4to5SerializationToConversion
  - org.axonframework.migration.AxonFramework4to5TestFixtureRenames
