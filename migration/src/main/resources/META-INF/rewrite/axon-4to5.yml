# Top-level upgrade recipe. Composes the per-module rename recipes (one per
# AF5 framework module / extension). Each per-module recipe is independently
# runnable. Placeholder extension recipes (Reactor, Kafka, AMQP, Mongo,
# JGroups, Spring Cloud, Multitenancy, CDI, OpenTracing) are intentionally
# excluded from this composite — they are no-ops today and will be enabled
# here once their structural-rewrite implementations land.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.UpgradeAxonFramework4to5
displayName: Upgrade to Axon Framework 5
description: >-
  Migrates an Axon Framework 4.x application to Axon Framework 5. Bumps the
  Axon Framework dependency versions, then applies the per-module rename
  recipes (one per active extension and one per core framework module).
recipeList:
  # ── 1. Bump dependency versions ─────────────────────────────────────────
  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.axonframework
      artifactId: "*"
      newVersion: ${project.version}

  # ── 2. Active extension migrations ──────────────────────────────────────
  - org.axonframework.migration.AxonFramework4to5SpringExtension
  - org.axonframework.migration.AxonFramework4to5SpringBootExtension
  - org.axonframework.migration.AxonFramework4to5SpringBootActuatorExtension
  - org.axonframework.migration.AxonFramework4to5MetricsExtension
  - org.axonframework.migration.AxonFramework4to5MicrometerExtension
  - org.axonframework.migration.AxonFramework4to5TracingOpenTelemetryExtension

  # ── 3. Core framework module migrations ─────────────────────────────────
  - org.axonframework.migration.AxonFramework4to5MessagingRenames
  - org.axonframework.migration.AxonFramework4to5ModellingRenames
  - org.axonframework.migration.AxonFramework4to5EventSourcingRenames
  - org.axonframework.migration.AxonFramework4to5ConfigurationRenames
  - org.axonframework.migration.AxonFramework4to5SerializationToConversion
  - org.axonframework.migration.AxonFramework4to5TestFixtureRenames
