# Top-level Axon Framework 4 → Axoniq Framework 5 commercial upgrade.
#
# This composite runs `UpgradeAxon4ToAxon5` first (the entire free AF5
# migration), then layers commercial-only migrations on top: source rewrites
# for Axon Server / DLQ / distributed-messaging, BOM swap to
# `axoniq-framework-bom`, Spring Boot starter swap to
# `axoniq-spring-boot-starter`, and conditional `AddDependency` for the
# Axoniq jars when the corresponding feature is in use.
#
# Use this when your AF4 application uses Axon Server, the sequenced DLQ,
# or DistributedCommandBus — those features were dropped from free AF5 and
# exist only in Axoniq Framework 5 commercial.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.UpgradeAxon4ToAxoniq5
displayName: Upgrade to Axoniq Framework 5 (commercial)
description: >-
  Migrates an Axon Framework 4.x application to Axoniq Framework 5
  (commercial). Composes `UpgradeAxon4ToAxon5` (the free leg) and then layers
  commercial-only migrations: BOM swap to
  `io.axoniq.framework:axoniq-framework-bom`, Spring Boot starter swap to
  `io.axoniq.framework:axoniq-spring-boot-starter`, source rewrites and
  Maven adds for Axon Server connector, sequenced dead-letter queue, and
  distributed messaging.
recipeList:
  # ── 1. Run the free-AF5 migration first ─────────────────────────────────
  - org.axonframework.migration.UpgradeAxon4ToAxon5

  # ── 2. Swap the BOM to the Axoniq commercial BOM ────────────────────────
  - org.axonframework.migration.Axon4ToAxoniq5Bom

  # ── 3. Swap the Spring Boot starter to the Axoniq commercial starter ────
  - org.axonframework.migration.Axon4ToAxoniq5SpringBoot

  # ── 4. Commercial-only feature migrations ───────────────────────────────
  - org.axonframework.migration.Axon4ToAxoniq5AxonServerConnector
  - org.axonframework.migration.Axon4ToAxoniq5DeadLetter
  - org.axonframework.migration.Axon4ToAxoniq5DistributedMessaging
  - org.axonframework.migration.Axon4ToAxoniq5Testcontainer
