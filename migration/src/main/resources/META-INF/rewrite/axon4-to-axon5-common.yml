# Common module (axon-common) renames.
#
# AF4 shipped a separate `axon-configuration` artifact whose contents merged
# into `axon-common` in AF5. The package `org.axonframework.config` therefore
# moves under `org.axonframework.common.configuration`, with class-level
# renames layered on top.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5Common
displayName: Apply Axon Framework 5 common module renames
description: >-
  Migrates `org.axonframework.config` to `org.axonframework.common.configuration`,
  renames `ConfigurerModule` to `ConfigurationEnhancer`, `ModuleConfiguration` to
  `Module`, `LifecycleOperations` to `LifecycleRegistry`, and relocates
  `EventProcessingConfigurer` under the messaging.eventhandling namespace.
recipeList:
  # в”Ђв”Ђ Package-prefix move: config в†’ common.configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.axonframework.config
      newPackageName: org.axonframework.common.configuration
      recursive: true

  # в”Ђв”Ђ Class renames on top of the package move в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.common.configuration.ConfigurerModule
      newFullyQualifiedTypeName: org.axonframework.common.configuration.ConfigurationEnhancer
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.common.configuration.ModuleConfiguration
      newFullyQualifiedTypeName: org.axonframework.common.configuration.Module
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.common.configuration.LifecycleOperations
      newFullyQualifiedTypeName: org.axonframework.common.configuration.LifecycleRegistry
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.common.configuration.EventProcessingConfigurer
      newFullyQualifiedTypeName: org.axonframework.messaging.eventhandling.configuration.EventProcessingConfigurer
