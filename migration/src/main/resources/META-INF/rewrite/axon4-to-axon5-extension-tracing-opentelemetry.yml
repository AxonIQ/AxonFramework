# OpenTelemetry tracing extension (axon-tracing-opentelemetry): package move.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5TracingOpenTelemetryExtension
displayName: Migrate the OpenTelemetry tracing extension to Axon Framework 5
description: >-
  Relocates `org.axonframework.tracing.opentelemetry` to
  `org.axonframework.extension.tracing.opentelemetry`.
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.axonframework.tracing.opentelemetry
      newPackageName: org.axonframework.extension.tracing.opentelemetry
      recursive: true
  # Maven coordinate move: org.axonframework:axon-tracing-opentelemetry →
  # org.axonframework.extensions.tracing:axon-tracing-opentelemetry.
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.axonframework
      oldArtifactId: axon-tracing-opentelemetry
      newGroupId: org.axonframework.extensions.tracing
      newArtifactId: axon-tracing-opentelemetry
