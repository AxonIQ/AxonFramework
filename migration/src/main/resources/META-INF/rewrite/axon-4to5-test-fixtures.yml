# Test fixture renames.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.AxonFramework4to5TestFixtureRenames
displayName: Apply Axon Framework 5 test fixture renames
description: >-
  Renames `AggregateTestFixture` and `SagaTestFixture` to the unified
  `AxonTestFixture` introduced in Axon Framework 5.
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.test.aggregate.AggregateTestFixture
      newFullyQualifiedTypeName: org.axonframework.test.fixture.AxonTestFixture
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.test.saga.SagaTestFixture
      newFullyQualifiedTypeName: org.axonframework.test.fixture.AxonTestFixture
