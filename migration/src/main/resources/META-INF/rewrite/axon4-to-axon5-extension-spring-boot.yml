# Spring Boot extension (axon-spring-boot-autoconfigure / -starter): package move.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5SpringBootExtension
displayName: Migrate the Spring Boot extension to Axon Framework 5
description: >-
  Relocates `org.axonframework.springboot` to
  `org.axonframework.extension.springboot`, matching the Maven groupId move
  to `org.axonframework.extensions.spring`.
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.axonframework.springboot
      newPackageName: org.axonframework.extension.springboot
      recursive: true
  # Maven coordinate moves for the Spring Boot artifacts: groupId
  # `org.axonframework` → `org.axonframework.extensions.spring`. ArtifactIds
  # (`axon-spring-boot-starter`, `axon-spring-boot-autoconfigure`) are unchanged.
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.axonframework
      oldArtifactId: axon-spring-boot-starter
      newGroupId: org.axonframework.extensions.spring
      newArtifactId: axon-spring-boot-starter
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.axonframework
      oldArtifactId: axon-spring-boot-autoconfigure
      newGroupId: org.axonframework.extensions.spring
      newArtifactId: axon-spring-boot-autoconfigure
