# Snapshotting — fundamentally redesigned for Axoniq Framework 5.
#
# AF4 design (now removed):
#   - org.axonframework.eventsourcing.Snapshotter (interface)
#   - org.axonframework.eventsourcing.EventCountSnapshotTriggerDefinition
#   - org.axonframework.eventsourcing.AggregateSnapshotter (and its Spring
#     factory bean, `SpringAggregateSnapshotterFactoryBean`)
#   - Snapshot storage was wired through the same JPA / Axon-Server event
#     store as regular events.
#
# AF5 design:
#   - Snapshot storage is a dedicated concern. The Axoniq commercial Axon
#     Server connector exposes `io.axoniq.framework.axonserver.connector.snapshot.AxonServerSnapshotStore`,
#     which talks to Axon Server's snapshot store API directly.
#   - Trigger-definition–driven snapshotting was removed; snapshotting is
#     now configured per entity via the entity metamodel.
#
# Because the API shape, configuration entry points, and storage path all
# changed, snapshot usage cannot be migrated by import rewriting alone —
# applications must redesign their snapshotting strategy. This recipe is
# kept as a placeholder so users can discover the topic and so future
# class-level mappings (when stable) can land here.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.AxonFramework4to5AxoniqSnapshotting
displayName: Migrate snapshotting to Axoniq Framework 5 (placeholder)
description: >-
  Placeholder. Snapshotting was redesigned in Axoniq Framework 5: the AF4
  `Snapshotter` / `EventCountSnapshotTriggerDefinition` /
  `AggregateSnapshotter` / `SpringAggregateSnapshotterFactoryBean` APIs no
  longer exist. AF5 uses the Axoniq commercial
  `io.axoniq.framework.axonserver.connector.snapshot.AxonServerSnapshotStore`
  together with per-entity snapshot configuration on the entity metamodel.
  Migrating snapshot configuration is a manual, design-level change and
  is not handled by automated import rewriting today.
