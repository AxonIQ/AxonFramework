# Top-level Axon Framework 4 → free Axon Framework 5 upgrade.
#
# WARNING for users: a few AF4 features were dropped from free AF5 and exist
# only in Axoniq Framework 5 commercial — Axon Server connector, sequenced
# dead-letter queue, and DistributedCommandBus. If your AF4 application uses
# any of those, this recipe alone leaves your codebase non-compiling. Use
# `UpgradeAxon4ToAxoniq5` instead.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.UpgradeAxon4ToAxon5
displayName: Upgrade to free Axon Framework 5
description: >-
  Migrates an Axon Framework 4.x application to free (Apache 2.0)
  Axon Framework 5. Bumps the Axon Framework dependency versions, applies
  per-module rename recipes (one per core framework module), and renames
  Maven coordinates within the `org.axonframework.*` namespace. Does NOT
  touch features dropped from free AF5 (Axon Server, DLQ, DistributedCommandBus)
  — see `UpgradeAxon4ToAxoniq5` for the commercial path.
recipeList:
  # ── 1. Java compiler-target bump ────────────────────────────────────────
  - org.axonframework.migration.UpgradeJava

  # ── 2. Spring Boot upgrade (2.x / 3.x → 3.5.x) ────────────────────────
  # Bumps spring-boot-starter-parent (or spring-boot-dependencies BOM) to the
  # latest 3.5.x patch, migrates javax → jakarta, and applies all incremental
  # Spring Boot 3.x API changes. Safe on projects already at 3.5.x or later
  # (including Spring Boot 4.x) — OpenRewrite never downgrades version numbers,
  # and the source-level sub-recipes are idempotent against already-migrated code.
  # Running this before the Axon renames keeps the javax→jakarta rewrite from
  # clashing with the Axon package moves.
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_5

  # ── 3. Bump dependency versions ─────────────────────────────────────────
  # Pinned to an explicit AF5 release so the migration is reproducible across
  # recipe builds (independent of the recipe project's own ${project.version}).
  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: org.axonframework
      artifactId: "*"
      newVersion: 5.1.0

  # ── 4. BOM rename (axon-bom → axon-framework-bom, version → 5.1.0) ──────
  - org.axonframework.migration.Axon4ToAxon5Bom

  # ── 5. Core framework module migrations ─────────────────────────────────
  - org.axonframework.migration.Axon4ToAxon5Common
  - org.axonframework.migration.Axon4ToAxon5Conversion
  - org.axonframework.migration.Axon4ToAxon5Messaging
  - org.axonframework.migration.Axon4ToAxon5Modelling
  - org.axonframework.migration.Axon4ToAxon5EventSourcing
  - org.axonframework.migration.Axon4ToAxon5Test

  # ── 6. Active extension migrations ──────────────────────────────────────
  - org.axonframework.migration.Axon4ToAxon5SpringExtension
  - org.axonframework.migration.Axon4ToAxon5SpringBootExtension
  - org.axonframework.migration.Axon4ToAxon5SpringBootActuatorExtension
  - org.axonframework.migration.Axon4ToAxon5SpringAotExtension
  - org.axonframework.migration.Axon4ToAxon5MetricsDropwizardExtension
  - org.axonframework.migration.Axon4ToAxon5MetricsMicrometerExtension
  - org.axonframework.migration.Axon4ToAxon5TracingOpenTelemetryExtension
  - org.axonframework.migration.Axon4ToAxon5ReactorExtension
