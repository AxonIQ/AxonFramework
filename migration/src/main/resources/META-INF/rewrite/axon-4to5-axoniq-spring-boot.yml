# Axoniq Spring Boot autoconfigure / starter
# (`io.axoniq.framework:axoniq-spring-boot-autoconfigure`,
#  `io.axoniq.framework:axoniq-spring-boot-starter`):
# placeholder.
#
# The AF4 `axon-spring-boot-starter` (under `org.axonframework.springboot`)
# bundled both core autoconfiguration and the Axon Server connector. In AF5
# the autoconfiguration is split:
#   - generic AF wiring → open-source `org.axonframework.extension.springboot.*`
#     (handled by `AxonFramework4to5SpringBootExtension`)
#   - Axoniq commercial wiring (Axon Server, distributed messaging, DLQ,
#     PostgreSQL connector, Axon Server actuator) → `io.axoniq.framework.springboot.*`
#
# Determining which AF4 autoconfig classes route to which side requires
# class-by-class analysis. This recipe is reserved for that mapping.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.AxonFramework4to5AxoniqSpringBoot
displayName: Migrate Axoniq-specific Spring Boot autoconfiguration (placeholder)
description: >-
  Placeholder. The AF4 `axon-spring-boot-starter` (package
  `org.axonframework.springboot`) bundled both the core autoconfiguration
  and the Axon Server / distributed messaging wiring. In Axoniq Framework 5
  these are split — generic wiring lives in
  `org.axonframework.extension.springboot` (open source) while the Axoniq
  commercial wiring lives in `io.axoniq.framework.springboot`. The default
  `AxonFramework4to5SpringBootExtension` recipe handles only the open-source
  side; class-level mappings for the Axoniq commercial autoconfig classes
  (Axon Server, distributed messaging, DLQ, Axon Server actuator) will be
  added here.
